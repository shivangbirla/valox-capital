<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0B0E" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#F7F8FB" media="(prefers-color-scheme: light)" />

    <title>Valox Capital — Disciplined investing, compounded over time</title>
    <meta
      name="description"
      content="Valox Capital actively manages and compounds your capital — pairing fifteen years of market experience with AI-augmented research. No management fees, no lock-in, T+1 liquidity."
    />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Valox Capital — Disciplined investing, compounded over time" />
    <meta
      property="og:description"
      content="Research-led, risk-first investing. No management fees, no lock-in, T+1 liquidity, and a NAV published every business day."
    />
    <meta property="og:site_name" content="Valox Capital" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Set theme before paint to avoid a flash of the wrong theme -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("valox-theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var theme = stored || (prefersDark ? "dark" : "light");
          if (theme === "dark") document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
